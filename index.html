<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DEÜ Tınaztepe Kampüsü — NDVI / NDBI / GLCM</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      color: #fff;
    }
    canvas { display: block; cursor: grab; }
    canvas:active { cursor: grabbing; }

    #buttons {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 2px;
      z-index: 20;
      background: rgba(255,255,255,0.06);
      border-radius: 8px;
      padding: 3px;
    }
    .mode-btn {
      background: transparent;
      color: rgba(255,255,255,0.5);
      border: none;
      padding: 8px 20px;
      font-family: inherit;
      font-size: 12px;
      letter-spacing: 1px;
      cursor: pointer;
      border-radius: 6px;
      transition: all 0.3s ease;
    }
    .mode-btn.active {
      background: rgba(255,255,255,0.12);
      color: #fff;
    }
    .mode-btn:hover { color: rgba(255,255,255,0.8); }

    #data-toggle {
      position: fixed;
      top: 16px;
      right: 20px;
      display: flex;
      gap: 2px;
      z-index: 20;
      background: rgba(255,255,255,0.06);
      border-radius: 8px;
      padding: 3px;
    }
    .toggle-btn {
      background: transparent;
      color: rgba(255,255,255,0.5);
      border: none;
      padding: 6px 14px;
      font-family: inherit;
      font-size: 11px;
      letter-spacing: 0.5px;
      cursor: pointer;
      border-radius: 5px;
      transition: all 0.3s ease;
    }
    .toggle-btn.active {
      background: rgba(255,255,255,0.12);
      color: #fff;
    }
    .toggle-btn:hover { color: rgba(255,255,255,0.8); }

    #legend {
      position: fixed;
      top: 60px;
      right: 20px;
      background: rgba(0,0,0,0.85);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      padding: 14px 18px;
      font-size: 13px;
      line-height: 1.8;
      pointer-events: none;
      z-index: 10;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    #legend.visible { opacity: 1; }
    .legend-title {
      font-size: 14px; font-weight: bold;
      margin-bottom: 6px; letter-spacing: 0.5px;
      color: rgba(255,255,255,0.9);
    }
    .legend-item { display: flex; align-items: center; gap: 8px; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .legend-label { color: rgba(255,255,255,0.8); }

    #kampus-info {
      position: fixed;
      top: 60px;
      right: 20px;
      background: rgba(0,0,0,0.85);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      padding: 14px 18px;
      pointer-events: none;
      z-index: 10;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    #kampus-info.visible { opacity: 1; }

    #credit {
      position: fixed;
      bottom: 14px; left: 18px;
      font-size: 12px;
      color: rgba(255,255,255,0.7);
      letter-spacing: 0.4px;
      pointer-events: none;
      z-index: 10;
    }
    #zoom-info {
      position: fixed;
      bottom: 14px; right: 18px;
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      pointer-events: none;
      z-index: 10;
    }
  </style>
</head>
<body>
  <canvas id="chart"></canvas>

  <div id="buttons">
    <button class="mode-btn active" data-mode="manovich">Manovich</button>
    <button class="mode-btn" data-mode="fakulte">Fakülte</button>
    <button class="mode-btn" data-mode="kampus">Kampüs</button>
  </div>

  <div id="data-toggle">
    <button class="toggle-btn active" data-layer="spektral">NDVI / NDBI</button>
    <button class="toggle-btn" data-layer="glcm">GLCM</button>
  </div>

  <div id="kampus-info">
    <div class="legend-title" style="display:flex; align-items:center; gap:8px;">
      <span style="width:12px;height:12px;border-radius:50%;background:#2EC4B6;flex-shrink:0;"></span>
      DEÜ Tınaztepe Kampüsü
    </div>
    <div id="kampus-count" style="color:rgba(255,255,255,0.6); font-size:12px; line-height:1.6; margin-top:4px;">
      Sentinel-2, 2024
    </div>
  </div>

  <div id="legend">
    <div class="legend-title">Fakülte</div>
  </div>

  <div id="credit">DEÜ Tınaztepe Kampüsü — Sentinel-2 NDVI/NDBI/GLCM</div>
  <div id="zoom-info"></div>

  <script>
    const colorMap = {
      "Guzel Sanatlar": "#E07A5F",
      "Fen Edebiyat":   "#3D405B",
      "Isletme":        "#81B29A",
      "Denizcilik":     "#F2CC8F",
      "Hukuk":          "#5E6472",
      "Muhendislik":    "#9B2335",
      "Mimarlik":       "#F0E6D3",
      "Turizm":         "#577590"
    };
    const imageMap = {
      "Guzel Sanatlar": "gsf.jpg",
      "Fen Edebiyat":   "fen.jpg",
      "Isletme":        "isletme.jpg",
      "Denizcilik":     "denizcilik.jpg",
      "Hukuk":          "hukuk.jpg",
      "Muhendislik":    "muhendislik.jpg",
      "Mimarlik":       "mimarlik.jpg",
      "Turizm":         "turizm.jpg"
    };

    const TURQUOISE = "#2EC4B6";

    const legendEl = document.getElementById("legend");
    for (const [name, color] of Object.entries(colorMap)) {
      const item = document.createElement("div");
      item.className = "legend-item";
      item.innerHTML = `<span class="legend-dot" style="background:${color}"></span><span class="legend-label">${name}</span>`;
      legendEl.appendChild(item);
    }

    const kampusInfo = document.getElementById("kampus-info");
    const kampusCount = document.getElementById("kampus-count");
    const zoomInfo = document.getElementById("zoom-info");

    const images_foto = {};
    for (const [fak, src] of Object.entries(imageMap)) {
      const img = new Image();
      img.src = src;
      images_foto[fak] = img;
    }

    const canvas = document.getElementById("chart");
    const ctx = canvas.getContext("2d");

    let W, H;
    function resize() {
      W = window.innerWidth;
      H = window.innerHeight;
      canvas.width = W * devicePixelRatio;
      canvas.height = H * devicePixelRatio;
      canvas.style.width = W + "px";
      canvas.style.height = H + "px";
      ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
    }
    resize();

    const margin = { top: 50, right: 40, bottom: 60, left: 70 };
    let transform = d3.zoomIdentity;
    let currentMode = "manovich";
    let currentLayer = "spektral";

    let kampusSpektral = [], kampusGlcm = [];
    let fakulteSpektral = [], fakulteGlcm = [];
    let scales = {};

    function buildScales() {
      function ms(data, xK, yK) {
        const xE = d3.extent(data, d => d[xK]);
        const yE = d3.extent(data, d => d[yK]);
        const xP = (xE[1] - xE[0]) * 0.05 || 0.05;
        const yP = (yE[1] - yE[0]) * 0.05 || 0.05;
        return {
          x: d3.scaleLinear().domain([xE[0] - xP, xE[1] + xP]).range([margin.left, W - margin.right]),
          y: d3.scaleLinear().domain([yE[0] - yP, yE[1] + yP]).range([H - margin.bottom, margin.top])
        };
      }
      if (kampusSpektral.length) scales.kS = ms(kampusSpektral, "ndvi", "ndbi");
      if (kampusGlcm.length) scales.kG = ms(kampusGlcm, "glcm_contrast", "glcm_entropy");
      if (fakulteSpektral.length) scales.fS = ms(fakulteSpektral, "ndvi", "ndbi");
      if (fakulteGlcm.length) scales.fG = ms(fakulteGlcm, "glcm_contrast", "glcm_entropy");
    }

    function getSc() {
      const g = currentLayer === "glcm";
      if (currentMode === "kampus" || currentMode === "manovich") return g ? scales.kG : scales.kS;
      return g ? scales.fG : scales.fS;
    }

    function keys() {
      return currentLayer === "glcm"
        ? { x: "glcm_contrast", y: "glcm_entropy" }
        : { x: "ndvi", y: "ndbi" };
    }

    function drawAxes(zx, zy) {
      const lab = currentLayer === "glcm"
        ? { x: "GLCM Kontrast", y: "GLCM Entropi" }
        : { x: "NDVI", y: "NDBI" };

      ctx.strokeStyle = "rgba(255,255,255,0.25)";
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(margin.left, H - margin.bottom);
      ctx.lineTo(W - margin.right, H - margin.bottom);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(margin.left, margin.top);
      ctx.lineTo(margin.left, H - margin.bottom);
      ctx.stroke();

      ctx.fillStyle = "rgba(255,255,255,0.6)";
      ctx.font = "11px monospace";
      ctx.textAlign = "center";
      zx.ticks(8).forEach(t => {
        const x = zx(t);
        if (x >= margin.left && x <= W - margin.right) {
          ctx.beginPath(); ctx.moveTo(x, H - margin.bottom); ctx.lineTo(x, H - margin.bottom + 5); ctx.stroke();
          ctx.fillText(currentLayer === "glcm" ? t.toFixed(0) : t.toFixed(2), x, H - margin.bottom + 18);
        }
      });

      ctx.textAlign = "right";
      zy.ticks(8).forEach(t => {
        const y = zy(t);
        if (y >= margin.top && y <= H - margin.bottom) {
          ctx.beginPath(); ctx.moveTo(margin.left - 5, y); ctx.lineTo(margin.left, y); ctx.stroke();
          ctx.fillText(currentLayer === "glcm" ? t.toFixed(1) : t.toFixed(2), margin.left - 8, y + 4);
        }
      });

      ctx.fillStyle = "rgba(255,255,255,0.7)";
      ctx.font = "13px monospace";
      ctx.textAlign = "center";
      ctx.fillText(lab.x, (margin.left + W - margin.right) / 2, H - 12);
      ctx.save();
      ctx.translate(16, (margin.top + H - margin.bottom) / 2);
      ctx.rotate(-Math.PI / 2);
      ctx.fillText(lab.y, 0, 0);
      ctx.restore();
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = "#000";
      ctx.fillRect(0, 0, W, H);

      const sc = getSc();
      if (!sc) return;
      const k_ = keys();

      ctx.save();
      ctx.beginPath();
      ctx.rect(margin.left, margin.top, W - margin.left - margin.right, H - margin.top - margin.bottom);
      ctx.clip();

      if (currentMode === "kampus") {
        legendEl.classList.remove("visible");
        kampusInfo.classList.add("visible");
        zoomInfo.textContent = "";
        canvas.style.cursor = "default";

        const data = currentLayer === "glcm" ? kampusGlcm : kampusSpektral;
        kampusCount.textContent = data.length.toLocaleString() + " piksel · Sentinel-2, 2024";

        for (let i = 0; i < data.length; i++) {
          const d = data[i];
          ctx.fillStyle = TURQUOISE;
          ctx.globalAlpha = 0.9;
          ctx.beginPath();
          ctx.arc(sc.x(d[k_.x]), sc.y(d[k_.y]), 0.5, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.globalAlpha = 1;
        ctx.restore();
        drawAxes(sc.x, sc.y);

      } else if (currentMode === "fakulte") {
        legendEl.classList.add("visible");
        kampusInfo.classList.remove("visible");
        zoomInfo.textContent = "";
        canvas.style.cursor = "default";

        const data = currentLayer === "glcm" ? fakulteGlcm : fakulteSpektral;

        for (let i = 0; i < data.length; i++) {
          const d = data[i];
          ctx.fillStyle = colorMap[d.fakulte] || "#fff";
          ctx.globalAlpha = 0.9;
          ctx.beginPath();
          ctx.arc(sc.x(d[k_.x]), sc.y(d[k_.y]), 1.2, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.globalAlpha = 1;
        ctx.restore();
        drawAxes(sc.x, sc.y);

      } else {
        const zx = transform.rescaleX(sc.x);
        const zy = transform.rescaleY(sc.y);
        const k = transform.k;
        const showColors = k >= 2.5;
        const showPhotos = k >= 5;

        canvas.style.cursor = "grab";
        zoomInfo.textContent = "Scroll ile zoom · Sürükle ile kaydır";

        if (showColors) {
          legendEl.classList.add("visible");
          kampusInfo.classList.remove("visible");
        } else {
          legendEl.classList.remove("visible");
          kampusInfo.classList.add("visible");
          const kData = currentLayer === "glcm" ? kampusGlcm : kampusSpektral;
          kampusCount.textContent = kData.length.toLocaleString() + " piksel · Sentinel-2, 2024";
        }

        if (!showColors) {
          const data = currentLayer === "glcm" ? kampusGlcm : kampusSpektral;
          for (let i = 0; i < data.length; i++) {
            const d = data[i];
            const x = zx(d[k_.x]);
            const y = zy(d[k_.y]);
            if (x < margin.left - 5 || x > W - margin.right + 5 || y < margin.top - 5 || y > H - margin.bottom + 5) continue;
            ctx.fillStyle = TURQUOISE;
            ctx.globalAlpha = 0.9;
            ctx.beginPath();
            ctx.arc(x, y, Math.max(0.5, 0.5 * Math.min(k, 3)), 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.globalAlpha = 1;
        } else {
          const data = currentLayer === "glcm" ? fakulteGlcm : fakulteSpektral;
          const photoSize = Math.max(20, Math.min(60, 16 + (k - 5) * 5));
          let photosDrawn = 0;

          for (let i = 0; i < data.length; i++) {
            const d = data[i];
            const x = zx(d[k_.x]);
            const y = zy(d[k_.y]);
            if (x < margin.left - 10 || x > W - margin.right + 10 || y < margin.top - 10 || y > H - margin.bottom + 10) continue;

            if (showPhotos && photosDrawn < 120 && images_foto[d.fakulte] && images_foto[d.fakulte].complete) {
              const half = photoSize / 2;
              ctx.drawImage(images_foto[d.fakulte], x - half, y - half, photoSize, photoSize);
              ctx.strokeStyle = "rgba(255,255,255,0.25)";
              ctx.lineWidth = 0.5;
              ctx.strokeRect(x - half, y - half, photoSize, photoSize);
              photosDrawn++;
            } else {
              ctx.fillStyle = colorMap[d.fakulte] || "#fff";
              ctx.globalAlpha = 0.9;
              ctx.beginPath();
              ctx.arc(x, y, Math.max(1, 1.5 * Math.min(k, 4)), 0, Math.PI * 2);
              ctx.fill();
              ctx.globalAlpha = 1;
            }
          }
        }
        ctx.restore();
        drawAxes(zx, zy);
      }
    }

    const zoom = d3.zoom()
      .scaleExtent([1, 25])
      .translateExtent([[margin.left, margin.top], [W - margin.right, H - margin.bottom]])
      .filter((event) => {
        if (currentMode !== "manovich") return false;
        return true;
      })
      .on("zoom", (event) => {
        transform = event.transform;
        draw();
      });

    d3.select(canvas).call(zoom);

    document.querySelectorAll(".mode-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".mode-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        currentMode = btn.dataset.mode;
        if (currentMode === "manovich") {
          transform = d3.zoomIdentity;
          d3.select(canvas).call(zoom.transform, d3.zoomIdentity);
        }
        draw();
      });
    });

    document.querySelectorAll(".toggle-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".toggle-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        currentLayer = btn.dataset.layer;
        if (currentMode === "manovich") {
          transform = d3.zoomIdentity;
          d3.select(canvas).call(zoom.transform, d3.zoomIdentity);
        }
        draw();
      });
    });

    Promise.all([
      d3.csv("kampus_piksel_veri_duzeltilmis.csv", d => ({ ndvi: +d.ndvi, ndbi: +d.ndbi })),
      d3.csv("kampus_glcm_piksel.csv", d => ({ glcm_contrast: +d.glcm_contrast, glcm_entropy: +d.glcm_entropy })),
      d3.csv("piksel_veri.csv", d => ({ ndvi: +d.ndvi, ndbi: +d.ndbi, fakulte: d.fakulte ? d.fakulte.trim() : "" })),
      d3.csv("fakulte_glcm_piksel.csv", d => ({ glcm_contrast: +d.glcm_contrast, glcm_entropy: +d.glcm_entropy, fakulte: d.fakulte ? d.fakulte.trim() : "" }))
    ]).then(([ks, kg, fs, fg]) => {
      kampusSpektral = ks.filter(d => Number.isFinite(d.ndvi) && Number.isFinite(d.ndbi));
      kampusGlcm = kg.filter(d => Number.isFinite(d.glcm_contrast) && Number.isFinite(d.glcm_entropy));
      fakulteSpektral = fs.filter(d => Number.isFinite(d.ndvi) && Number.isFinite(d.ndbi) && d.fakulte);
      fakulteGlcm = fg.filter(d => Number.isFinite(d.glcm_contrast) && Number.isFinite(d.glcm_entropy) && d.fakulte);
      buildScales();
      draw();
    }).catch(err => {
      ctx.fillStyle = "#fff";
      ctx.font = "14px monospace";
      ctx.fillText("CSV yüklenemedi: " + err.message, 20, 30);
      console.error(err);
    });

    window.addEventListener("resize", () => {
      resize();
      if (kampusSpektral.length) { buildScales(); draw(); }
    });
  </script>
</body>
</html>
