<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DEÜ Tınaztepe Kampüsü — NDVI / NDBI</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }

    svg {
      display: block;
      width: 100vw;
      height: 100vh;
      background: #000;
      cursor: grab;
    }

    svg:active {
      cursor: grabbing;
    }

    .axis path,
    .axis line {
      stroke: rgba(255,255,255,0.55);
      shape-rendering: crispEdges;
    }

    .axis text {
      fill: #fff;
      font-size: 12px;
      font-family: inherit;
    }

    .axis-label {
      fill: #fff;
      font-size: 13px;
      letter-spacing: 0.5px;
    }

    .credit {
      fill: rgba(255,255,255,0.88);
      font-size: 12px;
      letter-spacing: 0.4px;
    }

    .point {
      opacity: 0.88;
    }

    .photo-node image {
      pointer-events: none;
    }
  </style>
</head>
<body>
  <svg id="chart"></svg>

  <script>
    const colorMap = {
      "Guzel Sanatlar": "#E07A5F",
      "Fen Edebiyat": "#3D405B",
      "Isletme": "#81B29A",
      "Denizcilik": "#F2CC8F",
      "Hukuk": "#5E6472",
      "Muhendislik": "#9B2335",
      "Mimarlik": "#F0E6D3",
      "Turizm": "#577590"
    };

    const imageMap = {
      "Guzel Sanatlar": "gsf.jpg",
      "Fen Edebiyat": "fen.jpg",
      "Isletme": "isletme.jpg",
      "Denizcilik": "denizcilik.jpg",
      "Hukuk": "hukuk.jpg",
      "Muhendislik": "muhendislik.jpg",
      "Mimarlik": "mimarlik.jpg",
      "Turizm": "turizm.jpg"
    };

    const svg = d3.select("#chart");
    const width = window.innerWidth;
    const height = window.innerHeight;

    const margin = { top: 50, right: 40, bottom: 60, left: 70 };
    const innerWidth = width - margin.left - margin.right;
    const innerHeight = height - margin.top - margin.bottom;

    svg.attr("viewBox", `0 0 ${width} ${height}`);

    const root = svg.append("g");
    const plot = root.append("g").attr("transform", `translate(${margin.left},${margin.top})`);

    const clipId = "plot-clip";
    svg.append("defs")
      .append("clipPath")
      .attr("id", clipId)
      .append("rect")
      .attr("x", margin.left)
      .attr("y", margin.top)
      .attr("width", innerWidth)
      .attr("height", innerHeight);

    const axisLayer = root.append("g");
    const pointsLayer = root.append("g").attr("clip-path", `url(#${clipId})`);
    const photosLayer = root.append("g").attr("clip-path", `url(#${clipId})`);

    const xAxisG = axisLayer.append("g")
      .attr("class", "axis")
      .attr("transform", `translate(${margin.left},${margin.top + innerHeight})`);

    const yAxisG = axisLayer.append("g")
      .attr("class", "axis")
      .attr("transform", `translate(${margin.left},${margin.top})`);

    axisLayer.append("text")
      .attr("class", "axis-label")
      .attr("x", margin.left + innerWidth / 2)
      .attr("y", height - 18)
      .attr("text-anchor", "middle")
      .text("NDVI");

    axisLayer.append("text")
      .attr("class", "axis-label")
      .attr("transform", `translate(20, ${margin.top + innerHeight / 2}) rotate(-90)`)
      .attr("text-anchor", "middle")
      .text("NDBI");

    svg.append("text")
      .attr("class", "credit")
      .attr("x", 18)
      .attr("y", height - 18)
      .text("DEÜ Tınaztepe Kampüsü — Sentinel-2");

    let baseXScale, baseYScale, currentTransform = d3.zoomIdentity;
    let data = [];
    let pointSelection;

    function coerceRow(d) {
      return {
        longitude: +d.longitude,
        latitude: +d.latitude,
        ndvi: +d.ndvi,
        ndbi: +d.ndbi,
        fakulte: d.fakulte ? d.fakulte.trim() : ""
      };
    }

    function buildChart(rows) {
      data = rows.filter(d =>
        Number.isFinite(d.ndvi) &&
        Number.isFinite(d.ndbi) &&
        d.fakulte
      );

      const xExtent = d3.extent(data, d => d.ndvi);
      const yExtent = d3.extent(data, d => d.ndbi);

      const xPad = (xExtent[1] - xExtent[0]) * 0.05 || 0.05;
      const yPad = (yExtent[1] - yExtent[0]) * 0.05 || 0.05;

      baseXScale = d3.scaleLinear()
        .domain([xExtent[0] - xPad, xExtent[1] + xPad])
        .range([margin.left, margin.left + innerWidth]);

      baseYScale = d3.scaleLinear()
        .domain([yExtent[0] - yPad, yExtent[1] + yPad])
        .range([margin.top + innerHeight, margin.top]);

      xAxisG.call(d3.axisBottom(baseXScale).ticks(8));
      yAxisG.call(d3.axisLeft(baseYScale).ticks(8));

      pointSelection = pointsLayer.selectAll("circle")
        .data(data)
        .join("circle")
        .attr("class", "point")
        .attr("cx", d => baseXScale(d.ndvi))
        .attr("cy", d => baseYScale(d.ndbi))
        .attr("r", 2.2)
        .attr("fill", d => colorMap[d.fakulte] || "#ffffff");

      const zoom = d3.zoom()
        .scaleExtent([1, 20])
        .extent([[margin.left, margin.top], [margin.left + innerWidth, margin.top + innerHeight]])
        .translateExtent([[margin.left - 2000, margin.top - 2000], [margin.left + innerWidth + 2000, margin.top + innerHeight + 2000]])
        .on("zoom", zoomed);

      svg.call(zoom);
    }

    function zoomed(event) {
      currentTransform = event.transform;

      const zx = currentTransform.rescaleX(baseXScale);
      const zy = currentTransform.rescaleY(baseYScale);

      xAxisG.call(d3.axisBottom(zx).ticks(8));
      yAxisG.call(d3.axisLeft(zy).ticks(8));

      pointSelection
        .attr("cx", d => zx(d.ndvi))
        .attr("cy", d => zy(d.ndbi));

      renderPhotos(zx, zy, currentTransform.k);
    }

    function renderPhotos(zx, zy, k) {
      photosLayer.selectAll("*").remove();

      if (k <= 4) {
        pointSelection.style("display", null);
        return;
      }

      const visible = [];
      const left = margin.left;
      const right = margin.left + innerWidth;
      const top = margin.top;
      const bottom = margin.top + innerHeight;

      for (let i = 0; i < data.length; i++) {
        const d = data[i];
        const x = zx(d.ndvi);
        const y = zy(d.ndbi);

        if (x >= left && x <= right && y >= top && y <= bottom) {
          visible.push({ ...d, sx: x, sy: y });
        }
      }

      const maxPhotos = 100;
      const chosen = visible.slice(0, maxPhotos);

      const chosenSet = new Set(chosen.map(d => d.longitude + "|" + d.latitude + "|" + d.ndvi + "|" + d.ndbi + "|" + d.fakulte));

      pointSelection.style("display", d => {
        const key = d.longitude + "|" + d.latitude + "|" + d.ndvi + "|" + d.ndbi + "|" + d.fakulte;
        return chosenSet.has(key) ? "none" : null;
      });

      const imgSize = Math.max(16, Math.min(44, 14 + (k - 4) * 4));

      const photoNodes = photosLayer.selectAll("g.photo-node")
        .data(chosen, d => d.longitude + "|" + d.latitude + "|" + d.ndvi + "|" + d.ndbi + "|" + d.fakulte)
        .join("g")
        .attr("class", "photo-node")
        .attr("transform", d => `translate(${d.sx - imgSize / 2}, ${d.sy - imgSize / 2})`);

      photoNodes.append("image")
        .attr("href", d => imageMap[d.fakulte] || "")
        .attr("width", imgSize)
        .attr("height", imgSize)
        .attr("preserveAspectRatio", "xMidYMid slice");

      photoNodes.append("rect")
        .attr("width", imgSize)
        .attr("height", imgSize)
        .attr("fill", "none")
        .attr("stroke", "rgba(255,255,255,0.5)")
        .attr("stroke-width", 0.5);
    }

    d3.csv("piksel_veri.csv", coerceRow).then(buildChart).catch(err => {
      console.error(err);

      svg.append("text")
        .attr("x", 20)
        .attr("y", 30)
        .attr("fill", "#fff")
        .style("font-size", "14px")
        .text("CSV yüklenemedi: piksel_veri.csv aynı klasörde olmalı.");

      svg.append("text")
        .attr("x", 20)
        .attr("y", 52)
        .attr("fill", "#fff")
        .style("font-size", "12px")
        .text("Dosyayı yerel sunucu üzerinden açın. Örnek: python3 -m http.server 8000");
    });

    window.addEventListener("resize", () => {
      location.reload();
    });
  </script>
</body>
</html>
