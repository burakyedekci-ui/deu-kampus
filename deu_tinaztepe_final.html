<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DEÜ Tınaztepe Kampüsü — NDVI / NDBI</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      color: #fff;
    }
    canvas {
      display: block;
      cursor: grab;
    }
    canvas:active { cursor: grabbing; }

    #legend {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(0,0,0,0.85);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      padding: 14px 18px;
      font-size: 13px;
      line-height: 1.8;
      pointer-events: none;
      z-index: 10;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    #legend.visible { opacity: 1; }

    .legend-title {
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 6px;
      letter-spacing: 0.5px;
      color: rgba(255,255,255,0.9);
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .legend-label {
      color: rgba(255,255,255,0.8);
    }

    #credit {
      position: fixed;
      bottom: 14px;
      left: 18px;
      font-size: 12px;
      color: rgba(255,255,255,0.7);
      letter-spacing: 0.4px;
      pointer-events: none;
      z-index: 10;
    }

    #zoom-info {
      position: fixed;
      bottom: 14px;
      right: 18px;
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      pointer-events: none;
      z-index: 10;
      transition: color 0.3s ease;
    }

    #mode-label {
      position: fixed;
      top: 20px;
      left: 18px;
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      letter-spacing: 1px;
      pointer-events: none;
      z-index: 10;
      transition: all 0.4s ease;
    }
  </style>
</head>
<body>
  <canvas id="chart"></canvas>

  <div id="mode-label">KAMPÜS</div>

  <div id="legend">
    <div class="legend-title">Fakülte</div>
  </div>

  <div id="credit">DEÜ Tınaztepe Kampüsü — Sentinel-2 NDVI/NDBI</div>
  <div id="zoom-info">Scroll ile zoom · Sürükle ile kaydır</div>

  <script>
    const colorMap = {
      "Guzel Sanatlar": "#E07A5F",
      "Fen Edebiyat":   "#3D405B",
      "Isletme":        "#81B29A",
      "Denizcilik":     "#F2CC8F",
      "Hukuk":          "#5E6472",
      "Muhendislik":    "#9B2335",
      "Mimarlik":       "#F0E6D3",
      "Turizm":         "#577590"
    };

    const imageMap = {
      "Guzel Sanatlar": "gsf.jpg",
      "Fen Edebiyat":   "fen.jpg",
      "Isletme":        "isletme.jpg",
      "Denizcilik":     "denizcilik.jpg",
      "Hukuk":          "hukuk.jpg",
      "Muhendislik":    "muhendislik.jpg",
      "Mimarlik":       "mimarlik.jpg",
      "Turizm":         "turizm.jpg"
    };

    const TURQUOISE = "#2EC4B6";
    const THRESHOLD_COLOR = 3;
    const THRESHOLD_PHOTO = 6;

    // Build legend
    const legendEl = document.getElementById("legend");
    for (const [name, color] of Object.entries(colorMap)) {
      const item = document.createElement("div");
      item.className = "legend-item";
      item.innerHTML = `<span class="legend-dot" style="background:${color}"></span><span class="legend-label">${name}</span>`;
      legendEl.appendChild(item);
    }

    const modeLabel = document.getElementById("mode-label");
    const zoomInfo = document.getElementById("zoom-info");

    // Preload images
    const images = {};
    let imagesLoaded = 0;
    const totalImages = Object.keys(imageMap).length;

    for (const [fak, src] of Object.entries(imageMap)) {
      const img = new Image();
      img.onload = () => { imagesLoaded++; if (imagesLoaded === totalImages) draw(); };
      img.onerror = () => { imagesLoaded++; if (imagesLoaded === totalImages) draw(); };
      img.src = src;
      images[fak] = img;
    }

    const canvas = document.getElementById("chart");
    const ctx = canvas.getContext("2d");

    let W, H;
    function resize() {
      W = window.innerWidth;
      H = window.innerHeight;
      canvas.width = W * devicePixelRatio;
      canvas.height = H * devicePixelRatio;
      canvas.style.width = W + "px";
      canvas.style.height = H + "px";
      ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
    }
    resize();

    const margin = { top: 50, right: 40, bottom: 60, left: 70 };
    let data = [];
    let transform = d3.zoomIdentity;
    let xScale, yScale;

    function buildScales() {
      const xExt = d3.extent(data, d => d.ndvi);
      const yExt = d3.extent(data, d => d.ndbi);
      const xPad = (xExt[1] - xExt[0]) * 0.05 || 0.05;
      const yPad = (yExt[1] - yExt[0]) * 0.05 || 0.05;

      xScale = d3.scaleLinear()
        .domain([xExt[0] - xPad, xExt[1] + xPad])
        .range([margin.left, W - margin.right]);

      yScale = d3.scaleLinear()
        .domain([yExt[0] - yPad, yExt[1] + yPad])
        .range([H - margin.bottom, margin.top]);
    }

    function draw() {
      if (!data.length) return;

      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = "#000";
      ctx.fillRect(0, 0, W, H);

      const zx = transform.rescaleX(xScale);
      const zy = transform.rescaleY(yScale);
      const k = transform.k;

      // Update UI based on zoom level
      const showColors = k >= THRESHOLD_COLOR;
      const showPhotos = k >= THRESHOLD_PHOTO;

      if (showColors) {
        legendEl.classList.add("visible");
      } else {
        legendEl.classList.remove("visible");
      }

      if (showPhotos) {
        modeLabel.textContent = "MEKÂN";
        modeLabel.style.color = "rgba(255,255,255,0.8)";
      } else if (showColors) {
        modeLabel.textContent = "FAKÜLTE";
        modeLabel.style.color = "rgba(255,255,255,0.6)";
      } else {
        modeLabel.textContent = "KAMPÜS";
        modeLabel.style.color = "rgba(255,255,255,0.4)";
      }

      // Draw axes
      ctx.strokeStyle = "rgba(255,255,255,0.25)";
      ctx.lineWidth = 0.5;

      ctx.beginPath();
      ctx.moveTo(margin.left, H - margin.bottom);
      ctx.lineTo(W - margin.right, H - margin.bottom);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(margin.left, margin.top);
      ctx.lineTo(margin.left, H - margin.bottom);
      ctx.stroke();

      // X ticks
      ctx.fillStyle = "rgba(255,255,255,0.6)";
      ctx.font = "11px monospace";
      ctx.textAlign = "center";
      const xTicks = zx.ticks(8);
      let lastXLabel = "";
      xTicks.forEach(t => {
        const x = zx(t);
        const label = t.toFixed(2);
        if (x >= margin.left && x <= W - margin.right && label !== lastXLabel) {
          ctx.beginPath();
          ctx.moveTo(x, H - margin.bottom);
          ctx.lineTo(x, H - margin.bottom + 5);
          ctx.stroke();
          ctx.fillText(label, x, H - margin.bottom + 18);
          lastXLabel = label;
        }
      });

      // Y ticks
      ctx.textAlign = "right";
      const yTicks = zy.ticks(8);
      let lastYLabel = "";
      yTicks.forEach(t => {
        const y = zy(t);
        const label = t.toFixed(2);
        if (y >= margin.top && y <= H - margin.bottom && label !== lastYLabel) {
          ctx.beginPath();
          ctx.moveTo(margin.left - 5, y);
          ctx.lineTo(margin.left, y);
          ctx.stroke();
          ctx.fillText(label, margin.left - 8, y + 4);
          lastYLabel = label;
        }
      });

      // Axis labels
      ctx.fillStyle = "rgba(255,255,255,0.7)";
      ctx.font = "13px monospace";
      ctx.textAlign = "center";
      ctx.fillText("NDVI", (margin.left + W - margin.right) / 2, H - 12);

      ctx.save();
      ctx.translate(16, (margin.top + H - margin.bottom) / 2);
      ctx.rotate(-Math.PI / 2);
      ctx.fillText("NDBI", 0, 0);
      ctx.restore();

      // Clip region
      ctx.save();
      ctx.beginPath();
      ctx.rect(margin.left, margin.top, W - margin.left - margin.right, H - margin.top - margin.bottom);
      ctx.clip();

      const photoSize = Math.max(20, Math.min(60, 16 + (k - THRESHOLD_PHOTO) * 5));
      let photosDrawn = 0;
      const maxPhotos = 120;

      for (let i = 0; i < data.length; i++) {
        const d = data[i];
        const x = zx(d.ndvi);
        const y = zy(d.ndbi);

        if (x < margin.left - 10 || x > W - margin.right + 10 ||
            y < margin.top - 10 || y > H - margin.bottom + 10) continue;

        if (showPhotos && photosDrawn < maxPhotos && images[d.fakulte] && images[d.fakulte].complete) {
          const half = photoSize / 2;
          ctx.drawImage(images[d.fakulte], x - half, y - half, photoSize, photoSize);
          ctx.strokeStyle = "rgba(255,255,255,0.25)";
          ctx.lineWidth = 0.5;
          ctx.strokeRect(x - half, y - half, photoSize, photoSize);
          photosDrawn++;
        } else {
          const radius = Math.max(1.2, 2 * Math.min(k, 4));

          if (showColors) {
            ctx.fillStyle = colorMap[d.fakulte] || "#ffffff";
            ctx.globalAlpha = 0.8;
          } else {
            ctx.fillStyle = TURQUOISE;
            ctx.globalAlpha = 0.55;
          }

          ctx.beginPath();
          ctx.arc(x, y, radius, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalAlpha = 1;
        }
      }

      ctx.restore();
    }

    // Zoom
    const zoom = d3.zoom()
      .scaleExtent([1, 25])
      .translateExtent([[margin.left, margin.top], [W - margin.right, H - margin.bottom]])
      .extent([[margin.left, margin.top], [W - margin.right, H - margin.bottom]])
      .on("zoom", (event) => {
        transform = event.transform;
        draw();
      });

    d3.select(canvas).call(zoom);

    // Load data
    d3.csv("piksel_veri.csv", d => ({
      longitude: +d.longitude,
      latitude: +d.latitude,
      ndvi: +d.ndvi,
      ndbi: +d.ndbi,
      fakulte: d.fakulte ? d.fakulte.trim() : ""
    })).then(rows => {
      data = rows.filter(d => Number.isFinite(d.ndvi) && Number.isFinite(d.ndbi) && d.fakulte);
      buildScales();
      draw();
    }).catch(err => {
      ctx.fillStyle = "#fff";
      ctx.font = "14px monospace";
      ctx.fillText("CSV yüklenemedi: piksel_veri.csv aynı klasörde olmalı.", 20, 30);
      console.error(err);
    });

    window.addEventListener("resize", () => { resize(); if (data.length) { buildScales(); draw(); } });
  </script>
</body>
</html>
