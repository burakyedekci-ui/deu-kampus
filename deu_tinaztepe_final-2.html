<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DEÜ Tınaztepe Kampüsü — NDVI / NDBI</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      color: #fff;
    }
    canvas {
      display: block;
      cursor: grab;
    }
    canvas:active { cursor: grabbing; }

    #kampus-info {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(0,0,0,0.85);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      padding: 14px 18px;
      font-size: 13px;
      pointer-events: none;
      z-index: 10;
      opacity: 1;
      transition: opacity 0.5s ease;
    }
    #kampus-info.hidden { opacity: 0; }

    #legend {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(0,0,0,0.85);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      padding: 14px 18px;
      font-size: 13px;
      line-height: 1.8;
      pointer-events: none;
      z-index: 10;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    #legend.visible { opacity: 1; }

    .legend-title {
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 6px;
      letter-spacing: 0.5px;
      color: rgba(255,255,255,0.9);
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .legend-label {
      color: rgba(255,255,255,0.8);
    }

    #credit {
      position: fixed;
      bottom: 14px;
      left: 18px;
      font-size: 12px;
      color: rgba(255,255,255,0.7);
      letter-spacing: 0.4px;
      pointer-events: none;
      z-index: 10;
    }

    #zoom-info {
      position: fixed;
      bottom: 14px;
      right: 18px;
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      pointer-events: none;
      z-index: 10;
    }

    #mode-label {
      position: fixed;
      top: 20px;
      left: 18px;
      font-size: 13px;
      letter-spacing: 1px;
      pointer-events: none;
      z-index: 10;
      transition: all 0.4s ease;
    }
  </style>
</head>
<body>
  <canvas id="chart"></canvas>

  <div id="mode-label" style="color:rgba(255,255,255,0.4)">KAMPÜS</div>

  <div id="kampus-info">
    <div class="legend-title">DEÜ Tınaztepe Kampüsü</div>
    <div style="color:rgba(255,255,255,0.6); font-size:12px; line-height:1.6;">
      9.694 piksel<br>
      Sentinel-2, 2024
    </div>
  </div>

  <div id="legend">
    <div class="legend-title">Fakülte</div>
  </div>

  <div id="credit">DEÜ Tınaztepe Kampüsü — Sentinel-2 NDVI/NDBI</div>
  <div id="zoom-info">Scroll ile zoom · Sürükle ile kaydır</div>

  <script>
    const colorMap = {
      "Guzel Sanatlar": "#E07A5F",
      "Fen Edebiyat":   "#3D405B",
      "Isletme":        "#81B29A",
      "Denizcilik":     "#F2CC8F",
      "Hukuk":          "#5E6472",
      "Muhendislik":    "#9B2335",
      "Mimarlik":       "#F0E6D3",
      "Turizm":         "#577590"
    };

    const imageMap = {
      "Guzel Sanatlar": "gsf.jpg",
      "Fen Edebiyat":   "fen.jpg",
      "Isletme":        "isletme.jpg",
      "Denizcilik":     "denizcilik.jpg",
      "Hukuk":          "hukuk.jpg",
      "Muhendislik":    "muhendislik.jpg",
      "Mimarlik":       "mimarlik.jpg",
      "Turizm":         "turizm.jpg"
    };

    const TURQUOISE = "#2EC4B6";
    const THRESHOLD_COLOR = 2;
    const THRESHOLD_PHOTO = 5;

    // Legend oluştur
    const legendEl = document.getElementById("legend");
    for (const [name, color] of Object.entries(colorMap)) {
      const item = document.createElement("div");
      item.className = "legend-item";
      item.innerHTML = `<span class="legend-dot" style="background:${color}"></span><span class="legend-label">${name}</span>`;
      legendEl.appendChild(item);
    }

    const modeLabel = document.getElementById("mode-label");
    const kampusInfo = document.getElementById("kampus-info");

    // Fotoğrafları önceden yükle
    const images = {};
    let imagesLoaded = 0;
    const totalImages = Object.keys(imageMap).length;

    for (const [fak, src] of Object.entries(imageMap)) {
      const img = new Image();
      img.onload = () => { imagesLoaded++; if (imagesLoaded === totalImages && kampusData.length) draw(); };
      img.onerror = () => { imagesLoaded++; if (imagesLoaded === totalImages && kampusData.length) draw(); };
      img.src = src;
      images[fak] = img;
    }

    const canvas = document.getElementById("chart");
    const ctx = canvas.getContext("2d");

    let W, H;
    function resize() {
      W = window.innerWidth;
      H = window.innerHeight;
      canvas.width = W * devicePixelRatio;
      canvas.height = H * devicePixelRatio;
      canvas.style.width = W + "px";
      canvas.style.height = H + "px";
      ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
    }
    resize();

    const margin = { top: 50, right: 40, bottom: 60, left: 70 };
    let kampusData = [];
    let fakulteData = [];
    let transform = d3.zoomIdentity;
    let xScale, yScale;

    function buildScales() {
      const xExt = d3.extent(kampusData, d => d.ndvi);
      const yExt = d3.extent(kampusData, d => d.ndbi);
      const xPad = (xExt[1] - xExt[0]) * 0.05 || 0.05;
      const yPad = (yExt[1] - yExt[0]) * 0.05 || 0.05;

      xScale = d3.scaleLinear()
        .domain([xExt[0] - xPad, xExt[1] + xPad])
        .range([margin.left, W - margin.right]);

      yScale = d3.scaleLinear()
        .domain([yExt[0] - yPad, yExt[1] + yPad])
        .range([H - margin.bottom, margin.top]);
    }

    function draw() {
      if (!kampusData.length) return;

      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = "#000";
      ctx.fillRect(0, 0, W, H);

      const zx = transform.rescaleX(xScale);
      const zy = transform.rescaleY(yScale);
      const k = transform.k;

      const showColors = k >= THRESHOLD_COLOR;
      const showPhotos = k >= THRESHOLD_PHOTO;

      // UI güncelle
      if (showPhotos) {
        legendEl.classList.add("visible");
        kampusInfo.classList.add("hidden");
        modeLabel.textContent = "MEKÂN";
        modeLabel.style.color = "rgba(255,255,255,0.8)";
      } else if (showColors) {
        legendEl.classList.add("visible");
        kampusInfo.classList.add("hidden");
        modeLabel.textContent = "FAKÜLTE";
        modeLabel.style.color = "rgba(255,255,255,0.6)";
      } else {
        legendEl.classList.remove("visible");
        kampusInfo.classList.remove("hidden");
        modeLabel.textContent = "KAMPÜS";
        modeLabel.style.color = "rgba(255,255,255,0.4)";
      }

      // Eksenler
      ctx.strokeStyle = "rgba(255,255,255,0.25)";
      ctx.lineWidth = 0.5;

      ctx.beginPath();
      ctx.moveTo(margin.left, H - margin.bottom);
      ctx.lineTo(W - margin.right, H - margin.bottom);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(margin.left, margin.top);
      ctx.lineTo(margin.left, H - margin.bottom);
      ctx.stroke();

      // X ticks
      ctx.fillStyle = "rgba(255,255,255,0.6)";
      ctx.font = "11px monospace";
      ctx.textAlign = "center";
      let lastXLabel = "";
      zx.ticks(8).forEach(t => {
        const x = zx(t);
        const label = t.toFixed(2);
        if (x >= margin.left && x <= W - margin.right && label !== lastXLabel) {
          ctx.beginPath();
          ctx.moveTo(x, H - margin.bottom);
          ctx.lineTo(x, H - margin.bottom + 5);
          ctx.stroke();
          ctx.fillText(label, x, H - margin.bottom + 18);
          lastXLabel = label;
        }
      });

      // Y ticks
      ctx.textAlign = "right";
      let lastYLabel = "";
      zy.ticks(8).forEach(t => {
        const y = zy(t);
        const label = t.toFixed(2);
        if (y >= margin.top && y <= H - margin.bottom && label !== lastYLabel) {
          ctx.beginPath();
          ctx.moveTo(margin.left - 5, y);
          ctx.lineTo(margin.left, y);
          ctx.stroke();
          ctx.fillText(label, margin.left - 8, y + 4);
          lastYLabel = label;
        }
      });

      // Eksen isimleri
      ctx.fillStyle = "rgba(255,255,255,0.7)";
      ctx.font = "13px monospace";
      ctx.textAlign = "center";
      ctx.fillText("NDVI", (margin.left + W - margin.right) / 2, H - 12);

      ctx.save();
      ctx.translate(16, (margin.top + H - margin.bottom) / 2);
      ctx.rotate(-Math.PI / 2);
      ctx.fillText("NDBI", 0, 0);
      ctx.restore();

      // Clip
      ctx.save();
      ctx.beginPath();
      ctx.rect(margin.left, margin.top, W - margin.left - margin.right, H - margin.top - margin.bottom);
      ctx.clip();

      if (!showColors) {
        // KAMPÜS MODU — turkuaz, tüm kampüs verisi (9694 piksel)
        for (let i = 0; i < kampusData.length; i++) {
          const d = kampusData[i];
          const x = zx(d.ndvi);
          const y = zy(d.ndbi);

          if (x < margin.left - 5 || x > W - margin.right + 5 ||
              y < margin.top - 5 || y > H - margin.bottom + 5) continue;

          ctx.fillStyle = TURQUOISE;
          ctx.globalAlpha = 0.5;
          ctx.beginPath();
          ctx.arc(x, y, Math.max(1, 1.8 * Math.min(k, 3)), 0, Math.PI * 2);
          ctx.fill();
          ctx.globalAlpha = 1;
        }
      } else {
        // FAKÜLTE + FOTOĞRAF MODU — fakülte verisi (2397 piksel)
        const photoSize = Math.max(20, Math.min(60, 16 + (k - THRESHOLD_PHOTO) * 5));
        let photosDrawn = 0;
        const maxPhotos = 120;

        for (let i = 0; i < fakulteData.length; i++) {
          const d = fakulteData[i];
          const x = zx(d.ndvi);
          const y = zy(d.ndbi);

          if (x < margin.left - 10 || x > W - margin.right + 10 ||
              y < margin.top - 10 || y > H - margin.bottom + 10) continue;

          if (showPhotos && photosDrawn < maxPhotos && images[d.fakulte] && images[d.fakulte].complete) {
            const half = photoSize / 2;
            ctx.drawImage(images[d.fakulte], x - half, y - half, photoSize, photoSize);
            ctx.strokeStyle = "rgba(255,255,255,0.25)";
            ctx.lineWidth = 0.5;
            ctx.strokeRect(x - half, y - half, photoSize, photoSize);
            photosDrawn++;
          } else {
            ctx.fillStyle = colorMap[d.fakulte] || "#ffffff";
            ctx.globalAlpha = 0.8;
            ctx.beginPath();
            ctx.arc(x, y, Math.max(1.5, 2.2 * Math.min(k, 4)), 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;
          }
        }
      }

      ctx.restore();
    }

    // Zoom
    const zoom = d3.zoom()
      .scaleExtent([1, 25])
      .translateExtent([[margin.left, margin.top], [W - margin.right, H - margin.bottom]])
      .extent([[margin.left, margin.top], [W - margin.right, H - margin.bottom]])
      .on("zoom", (event) => {
        transform = event.transform;
        draw();
      });

    d3.select(canvas).call(zoom);

    // İki CSV'yi paralel yükle
    Promise.all([
      d3.csv("kampus_piksel_veri.csv", d => ({
        ndvi: +d.ndvi,
        ndbi: +d.ndbi
      })),
      d3.csv("piksel_veri.csv", d => ({
        longitude: +d.longitude,
        latitude: +d.latitude,
        ndvi: +d.ndvi,
        ndbi: +d.ndbi,
        fakulte: d.fakulte ? d.fakulte.trim() : ""
      }))
    ]).then(([kampus, fakulte]) => {
      kampusData = kampus.filter(d => Number.isFinite(d.ndvi) && Number.isFinite(d.ndbi));
      fakulteData = fakulte.filter(d => Number.isFinite(d.ndvi) && Number.isFinite(d.ndbi) && d.fakulte);
      buildScales();
      draw();
    }).catch(err => {
      ctx.fillStyle = "#fff";
      ctx.font = "14px monospace";
      ctx.fillText("CSV yüklenemedi. Dosyalar aynı klasörde olmalı:", 20, 30);
      ctx.font = "12px monospace";
      ctx.fillText("kampus_piksel_veri.csv + piksel_veri.csv", 20, 52);
      console.error(err);
    });

    window.addEventListener("resize", () => { resize(); if (kampusData.length) { buildScales(); draw(); } });
  </script>
</body>
</html>
