<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DEÜ Tınaztepe Kampüsü — NDVI / NDBI</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      color: #fff;
    }
    canvas { display: block; cursor: grab; }
    canvas:active { cursor: grabbing; }

    #buttons {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 2px;
      z-index: 20;
      background: rgba(255,255,255,0.06);
      border-radius: 8px;
      padding: 3px;
    }
    .mode-btn {
      background: transparent;
      color: rgba(255,255,255,0.5);
      border: none;
      padding: 8px 20px;
      font-family: inherit;
      font-size: 12px;
      letter-spacing: 1px;
      cursor: pointer;
      border-radius: 6px;
      transition: all 0.3s ease;
    }
    .mode-btn.active {
      background: rgba(255,255,255,0.12);
      color: #fff;
    }
    .mode-btn:hover { color: rgba(255,255,255,0.8); }

    #legend {
      position: fixed;
      top: 60px;
      right: 20px;
      background: rgba(0,0,0,0.85);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      padding: 14px 18px;
      font-size: 13px;
      line-height: 1.8;
      pointer-events: none;
      z-index: 10;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    #legend.visible { opacity: 1; }

    .legend-title {
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 6px;
      letter-spacing: 0.5px;
      color: rgba(255,255,255,0.9);
    }
    .legend-item { display: flex; align-items: center; gap: 8px; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .legend-label { color: rgba(255,255,255,0.8); }

    #kampus-info {
      position: fixed;
      top: 60px;
      right: 20px;
      background: rgba(0,0,0,0.85);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      padding: 14px 18px;
      pointer-events: none;
      z-index: 10;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    #kampus-info.visible { opacity: 1; }

    #credit {
      position: fixed;
      bottom: 14px;
      left: 18px;
      font-size: 12px;
      color: rgba(255,255,255,0.7);
      letter-spacing: 0.4px;
      pointer-events: none;
      z-index: 10;
    }
    #zoom-info {
      position: fixed;
      bottom: 14px;
      right: 18px;
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      pointer-events: none;
      z-index: 10;
    }
  </style>
</head>
<body>
  <canvas id="chart"></canvas>

  <div id="buttons">
    <button class="mode-btn active" data-mode="manovich">Manovich</button>
    <button class="mode-btn" data-mode="fakulte">Fakülte</button>
    <button class="mode-btn" data-mode="kampus">Kampüs</button>
  </div>

  <div id="kampus-info">
    <div class="legend-title" style="display:flex; align-items:center; gap:8px;">
      <span style="width:12px;height:12px;border-radius:50%;background:#2EC4B6;flex-shrink:0;"></span>
      DEÜ Tınaztepe Kampüsü
    </div>
    <div style="color:rgba(255,255,255,0.6); font-size:12px; line-height:1.6; margin-top:4px;">
      9.694 piksel · Sentinel-2, 2024
    </div>
  </div>

  <div id="legend">
    <div class="legend-title">Fakülte</div>
  </div>

  <div id="credit">DEÜ Tınaztepe Kampüsü — Sentinel-2 NDVI/NDBI</div>
  <div id="zoom-info"></div>

  <script>
    const colorMap = {
      "Guzel Sanatlar": "#E07A5F",
      "Fen Edebiyat":   "#3D405B",
      "Isletme":        "#81B29A",
      "Denizcilik":     "#F2CC8F",
      "Hukuk":          "#5E6472",
      "Muhendislik":    "#9B2335",
      "Mimarlik":       "#F0E6D3",
      "Turizm":         "#577590"
    };
    const imageMap = {
      "Guzel Sanatlar": "gsf.jpg",
      "Fen Edebiyat":   "fen.jpg",
      "Isletme":        "isletme.jpg",
      "Denizcilik":     "denizcilik.jpg",
      "Hukuk":          "hukuk.jpg",
      "Muhendislik":    "muhendislik.jpg",
      "Mimarlik":       "mimarlik.jpg",
      "Turizm":         "turizm.jpg"
    };

    const TURQUOISE = "#2EC4B6";

    // Legend oluştur
    const legendEl = document.getElementById("legend");
    for (const [name, color] of Object.entries(colorMap)) {
      const item = document.createElement("div");
      item.className = "legend-item";
      item.innerHTML = `<span class="legend-dot" style="background:${color}"></span><span class="legend-label">${name}</span>`;
      legendEl.appendChild(item);
    }

    const kampusInfo = document.getElementById("kampus-info");
    const zoomInfo = document.getElementById("zoom-info");

    // Fotoğrafları yükle
    const images = {};
    for (const [fak, src] of Object.entries(imageMap)) {
      const img = new Image();
      img.src = src;
      images[fak] = img;
    }

    const canvas = document.getElementById("chart");
    const ctx = canvas.getContext("2d");

    let W, H;
    function resize() {
      W = window.innerWidth;
      H = window.innerHeight;
      canvas.width = W * devicePixelRatio;
      canvas.height = H * devicePixelRatio;
      canvas.style.width = W + "px";
      canvas.style.height = H + "px";
      ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
    }
    resize();

    const margin = { top: 50, right: 40, bottom: 60, left: 70 };
    let kampusData = [];
    let fakulteData = [];
    let transform = d3.zoomIdentity;
    let xScaleK, yScaleK, xScaleF, yScaleF;
    let currentMode = "manovich";

    function buildScales() {
      // Kampüs ölçekleri
      const xExtK = d3.extent(kampusData, d => d.ndvi);
      const yExtK = d3.extent(kampusData, d => d.ndbi);
      const xPadK = (xExtK[1] - xExtK[0]) * 0.05 || 0.05;
      const yPadK = (yExtK[1] - yExtK[0]) * 0.05 || 0.05;
      xScaleK = d3.scaleLinear().domain([xExtK[0] - xPadK, xExtK[1] + xPadK]).range([margin.left, W - margin.right]);
      yScaleK = d3.scaleLinear().domain([yExtK[0] - yPadK, yExtK[1] + yPadK]).range([H - margin.bottom, margin.top]);

      // Fakülte ölçekleri
      const xExtF = d3.extent(fakulteData, d => d.ndvi);
      const yExtF = d3.extent(fakulteData, d => d.ndbi);
      const xPadF = (xExtF[1] - xExtF[0]) * 0.05 || 0.05;
      const yPadF = (yExtF[1] - yExtF[0]) * 0.05 || 0.05;
      xScaleF = d3.scaleLinear().domain([xExtF[0] - xPadF, xExtF[1] + xPadF]).range([margin.left, W - margin.right]);
      yScaleF = d3.scaleLinear().domain([yExtF[0] - yPadF, yExtF[1] + yPadF]).range([H - margin.bottom, margin.top]);
    }

    function drawAxes(zx, zy) {
      ctx.strokeStyle = "rgba(255,255,255,0.25)";
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(margin.left, H - margin.bottom);
      ctx.lineTo(W - margin.right, H - margin.bottom);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(margin.left, margin.top);
      ctx.lineTo(margin.left, H - margin.bottom);
      ctx.stroke();

      ctx.fillStyle = "rgba(255,255,255,0.6)";
      ctx.font = "11px monospace";
      ctx.textAlign = "center";
      let lastX = "";
      zx.ticks(8).forEach(t => {
        const x = zx(t);
        const label = t.toFixed(2);
        if (x >= margin.left && x <= W - margin.right && label !== lastX) {
          ctx.beginPath(); ctx.moveTo(x, H - margin.bottom); ctx.lineTo(x, H - margin.bottom + 5); ctx.stroke();
          ctx.fillText(label, x, H - margin.bottom + 18);
          lastX = label;
        }
      });

      ctx.textAlign = "right";
      let lastY = "";
      zy.ticks(8).forEach(t => {
        const y = zy(t);
        const label = t.toFixed(2);
        if (y >= margin.top && y <= H - margin.bottom && label !== lastY) {
          ctx.beginPath(); ctx.moveTo(margin.left - 5, y); ctx.lineTo(margin.left, y); ctx.stroke();
          ctx.fillText(label, margin.left - 8, y + 4);
          lastY = label;
        }
      });

      ctx.fillStyle = "rgba(255,255,255,0.7)";
      ctx.font = "13px monospace";
      ctx.textAlign = "center";
      ctx.fillText("NDVI", (margin.left + W - margin.right) / 2, H - 12);
      ctx.save();
      ctx.translate(16, (margin.top + H - margin.bottom) / 2);
      ctx.rotate(-Math.PI / 2);
      ctx.fillText("NDBI", 0, 0);
      ctx.restore();
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = "#000";
      ctx.fillRect(0, 0, W, H);

      ctx.save();
      ctx.beginPath();
      ctx.rect(margin.left, margin.top, W - margin.left - margin.right, H - margin.top - margin.bottom);
      ctx.clip();

      if (currentMode === "kampus") {
        // Sabit turkuaz — zoom yok
        legendEl.classList.remove("visible");
        kampusInfo.classList.add("visible");
        zoomInfo.textContent = "";
        canvas.style.cursor = "default";

        for (let i = 0; i < kampusData.length; i++) {
          const d = kampusData[i];
          const x = xScaleK(d.ndvi);
          const y = yScaleK(d.ndbi);
          ctx.fillStyle = TURQUOISE;
          ctx.globalAlpha = 0.5;
          ctx.beginPath();
          ctx.arc(x, y, 1.5, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalAlpha = 1;
        }
        ctx.restore();
        drawAxes(xScaleK, yScaleK);

      } else if (currentMode === "fakulte") {
        // Sabit fakülte renkleri — zoom yok
        legendEl.classList.add("visible");
        kampusInfo.classList.remove("visible");
        zoomInfo.textContent = "";
        canvas.style.cursor = "default";

        for (let i = 0; i < fakulteData.length; i++) {
          const d = fakulteData[i];
          const x = xScaleF(d.ndvi);
          const y = yScaleF(d.ndbi);
          ctx.fillStyle = colorMap[d.fakulte] || "#fff";
          ctx.globalAlpha = 0.8;
          ctx.beginPath();
          ctx.arc(x, y, 2, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalAlpha = 1;
        }
        ctx.restore();
        drawAxes(xScaleF, yScaleF);

      } else {
        // Manovich modu — zoom ile geçişler
        const zx = transform.rescaleX(xScaleK);
        const zy = transform.rescaleY(yScaleK);
        const k = transform.k;

        const showColors = k >= 1.8;
        const showPhotos = k >= 5;

        canvas.style.cursor = "grab";
        zoomInfo.textContent = "Scroll ile zoom · Sürükle ile kaydır";

        if (showPhotos) {
          legendEl.classList.add("visible");
          kampusInfo.classList.remove("visible");
        } else if (showColors) {
          legendEl.classList.add("visible");
          kampusInfo.classList.remove("visible");
        } else {
          legendEl.classList.remove("visible");
          kampusInfo.classList.add("visible");
        }

        if (!showColors) {
          // Turkuaz kampüs
          for (let i = 0; i < kampusData.length; i++) {
            const d = kampusData[i];
            const x = zx(d.ndvi);
            const y = zy(d.ndbi);
            if (x < margin.left - 5 || x > W - margin.right + 5 || y < margin.top - 5 || y > H - margin.bottom + 5) continue;
            ctx.fillStyle = TURQUOISE;
            ctx.globalAlpha = 0.5;
            ctx.beginPath();
            ctx.arc(x, y, Math.max(1, 1.5 * Math.min(k, 3)), 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;
          }
        } else {
          // Fakülte renkleri + fotoğraf
          const photoSize = Math.max(20, Math.min(60, 16 + (k - 5) * 5));
          let photosDrawn = 0;

          for (let i = 0; i < fakulteData.length; i++) {
            const d = fakulteData[i];
            const x = zx(d.ndvi);
            const y = zy(d.ndbi);
            if (x < margin.left - 10 || x > W - margin.right + 10 || y < margin.top - 10 || y > H - margin.bottom + 10) continue;

            if (showPhotos && photosDrawn < 120 && images[d.fakulte] && images[d.fakulte].complete) {
              const half = photoSize / 2;
              ctx.drawImage(images[d.fakulte], x - half, y - half, photoSize, photoSize);
              ctx.strokeStyle = "rgba(255,255,255,0.25)";
              ctx.lineWidth = 0.5;
              ctx.strokeRect(x - half, y - half, photoSize, photoSize);
              photosDrawn++;
            } else {
              ctx.fillStyle = colorMap[d.fakulte] || "#fff";
              ctx.globalAlpha = 0.8;
              ctx.beginPath();
              ctx.arc(x, y, Math.max(1.5, 2 * Math.min(k, 4)), 0, Math.PI * 2);
              ctx.fill();
              ctx.globalAlpha = 1;
            }
          }
        }
        ctx.restore();
        drawAxes(zx, zy);
      }
    }

    // Zoom — sadece Manovich modunda aktif
    const zoom = d3.zoom()
      .scaleExtent([1, 25])
      .translateExtent([[margin.left, margin.top], [W - margin.right, H - margin.bottom]])
      .extent([[margin.left, margin.top], [W - margin.right, H - margin.bottom]])
      .on("zoom", (event) => {
        if (currentMode !== "manovich") return;
        transform = event.transform;
        draw();
      });

    d3.select(canvas).call(zoom);

    // Buton kontrolü
    document.querySelectorAll(".mode-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".mode-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        currentMode = btn.dataset.mode;

        // Manovich moduna dönünce zoom sıfırla
        if (currentMode === "manovich") {
          transform = d3.zoomIdentity;
          d3.select(canvas).call(zoom.transform, d3.zoomIdentity);
        }

        draw();
      });
    });

    // Veri yükle
    Promise.all([
      d3.csv("kampus_piksel_veri.csv", d => ({ ndvi: +d.ndvi, ndbi: +d.ndbi })),
      d3.csv("piksel_veri.csv", d => ({
        longitude: +d.longitude, latitude: +d.latitude,
        ndvi: +d.ndvi, ndbi: +d.ndbi,
        fakulte: d.fakulte ? d.fakulte.trim() : ""
      }))
    ]).then(([kampus, fakulte]) => {
      kampusData = kampus.filter(d => Number.isFinite(d.ndvi) && Number.isFinite(d.ndbi));
      fakulteData = fakulte.filter(d => Number.isFinite(d.ndvi) && Number.isFinite(d.ndbi) && d.fakulte);
      buildScales();
      draw();
    }).catch(err => {
      ctx.fillStyle = "#fff";
      ctx.font = "14px monospace";
      ctx.fillText("CSV yüklenemedi.", 20, 30);
      console.error(err);
    });

    window.addEventListener("resize", () => { resize(); if (kampusData.length) { buildScales(); draw(); } });
  </script>
</body>
</html>
